<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make vs. Buy Calculator</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // Inline SVG Icons to replace lucide-react imports
    const CalculatorIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/></svg>
    );
    const CheckCircleIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-500 mr-2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
    );
    const TrendingUpIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-400"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    );
    const AlertCircleIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 mt-0.5 flex-shrink-0 text-amber-400"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    );

    function App() {
      // State for all inputs
      const [data, setData] = useState({
        itemName: 'Item Name',
        volume: 0,
        dm: 0,
        dl: 0,
        vmoh: 0,
        avoidableFC: 0,
        unavoidableFC: 0,
        purchasePrice: 0,
        opportunityIncome: 0,
      });

      // Handle input changes
      const handleChange = (e) => {
        const { name, value } = e.target;
        setData((prev) => ({
          ...prev,
          [name]: name === 'itemName' ? value : parseFloat(value) || 0,
        }));
      };

      // Helper to format currency
      const formatCurrency = (val) => {
        return new Intl.NumberFormat('en-US', {
          style: 'currency',
          currency: 'USD',
          minimumFractionDigits: 0,
          maximumFractionDigits: 2,
        }).format(val);
      };

      // Calculations
      const results = useMemo(() => {
        // Make Costs
        const totalVariableCostPerUnit = data.dm + data.dl + data.vmoh;
        const totalVariableCost = totalVariableCostPerUnit * data.volume;
        const totalRelevantMakeCost = totalVariableCost + data.avoidableFC;
        
        // Buy Costs
        const totalOutsourceCost = data.purchasePrice * data.volume;
        const totalRelevantBuyCost = totalOutsourceCost - data.opportunityIncome;

        // Decision
        const shouldMake = totalRelevantMakeCost < totalRelevantBuyCost;
        const difference = Math.abs(totalRelevantMakeCost - totalRelevantBuyCost);
        const isTie = totalRelevantMakeCost === totalRelevantBuyCost;

        return {
          totalVariableCostPerUnit,
          totalVariableCost,
          totalRelevantMakeCost,
          totalOutsourceCost,
          totalRelevantBuyCost,
          shouldMake,
          difference,
          isTie
        };
      }, [data]);

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            
            {/* Header */}
            <header className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 flex items-center space-x-4">
              <div className="bg-blue-600 p-3 rounded-xl text-white">
                <CalculatorIcon />
              </div>
              <div>
                <h1 className="text-2xl font-bold text-slate-900">Make vs. Buy Calculator</h1>
                <p className="text-slate-500">Managerial Accounting Decision Tool</p>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              
              {/* LEFT COLUMN: INPUTS */}
              <div className="lg:col-span-5 space-y-6">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="bg-slate-100 px-6 py-4 border-b border-slate-200 font-semibold text-slate-700 flex justify-between items-center">
                    <span>Input Variables</span>
                    <span className="text-xs font-normal bg-slate-200 px-2 py-1 rounded-md">Auto-saves</span>
                  </div>
                  
                  <div className="p-6 space-y-6">
                    
                    {/* General Info */}
                    <div className="space-y-4">
                      <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">General Info</h3>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Item Name</label>
                          <input type="text" name="itemName" value={data.itemName} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Volume (Units)</label>
                          <input type="number" name="volume" value={data.volume || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
                        </div>
                      </div>
                    </div>

                    <hr className="border-slate-100" />

                    {/* Make Costs */}
                    <div className="space-y-4">
                      <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Cost to MAKE (Per Unit)</h3>
                      <div className="grid grid-cols-3 gap-4">
                        <div>
                          <label className="block text-xs font-medium text-slate-700 mb-1">Direct Mat. ($)</label>
                          <input type="number" name="dm" value={data.dm || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-700 mb-1">Direct Labor ($)</label>
                          <input type="number" name="dl" value={data.dl || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-700 mb-1">Var. MOH ($)</label>
                          <input type="number" name="vmoh" value={data.vmoh || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                        </div>
                      </div>

                      <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mt-4">Fixed Costs (Total)</h3>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-medium text-slate-700 mb-1">Avoidable ($)</label>
                          <input type="number" name="avoidableFC" value={data.avoidableFC || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-700 mb-1 text-slate-400">Unavoidable ($) *</label>
                          <input type="number" name="unavoidableFC" value={data.unavoidableFC || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded-lg outline-none transition-all text-sm text-slate-500" />
                        </div>
                      </div>
                      <p className="text-[11px] text-slate-400 italic">* Unavoidable costs are ignored in differential analysis as they exist in both scenarios.</p>
                    </div>

                    <hr className="border-slate-100" />

                    {/* Buy Costs */}
                    <div className="space-y-4">
                      <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Cost to BUY</h3>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-medium text-slate-700 mb-1">Purchase Price/Unit ($)</label>
                          <input type="number" name="purchasePrice" value={data.purchasePrice || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-700 mb-1">Opportunity Income ($)</label>
                          <input type="number" name="opportunityIncome" value={data.opportunityIncome || ''} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" />
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
              </div>

              {/* RIGHT COLUMN: OUTPUTS */}
              <div className="lg:col-span-7 space-y-6">
                
                {/* Answer Box */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
                  <div className="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>
                  <div className="p-8">
                    <h2 className="text-xl font-bold text-slate-900 mb-6 flex items-center">
                      <CheckCircleIcon />
                      Your Answers (Copy & Paste)
                    </h2>
                    
                    <div className="space-y-6">
                      {/* Q26 */}
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-1">26) Compute the Total NET Relevant Cost to Make the {data.itemName} =</p>
                        <p className="text-xl font-bold text-blue-700 bg-white inline-block px-3 py-1 rounded border border-blue-100 shadow-sm">
                          {formatCurrency(results.totalRelevantMakeCost)}
                        </p>
                      </div>

                      {/* Q27 */}
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-1">27) Compute the Total NET Relevant Cost to Buy the {data.itemName} =</p>
                        <p className="text-xl font-bold text-blue-700 bg-white inline-block px-3 py-1 rounded border border-blue-100 shadow-sm">
                          {formatCurrency(results.totalRelevantBuyCost)}
                        </p>
                      </div>

                      {/* Q28 */}
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-1">28) Should We Make the {data.itemName} or Buy Them? Why? =</p>
                        <div className="bg-white p-3 rounded border border-slate-200 shadow-sm mt-2">
                          <span className="font-bold text-lg text-slate-900 uppercase">
                            {results.isTie ? 'EITHER (IT IS A TIE)' : (results.shouldMake ? 'MAKE THEM' : 'BUY THEM')}
                          </span>
                          <p className="text-slate-600 mt-2 text-sm leading-relaxed">
                            We should {results.isTie ? 'choose either option' : (results.shouldMake ? 'make the' : 'buy the')} {data.itemName} because the total relevant cost to {results.shouldMake ? 'make' : 'buy'} ({formatCurrency(results.shouldMake ? results.totalRelevantMakeCost : results.totalRelevantBuyCost)}) is lower than the cost to {results.shouldMake ? 'buy' : 'make'} ({formatCurrency(results.shouldMake ? results.totalRelevantBuyCost : results.totalRelevantMakeCost)}).
                          </p>
                        </div>
                      </div>

                      {/* Q29 */}
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-1">29) Compute the Dollar Benefit to your Decision in this Question Above =</p>
                        <p className="text-xl font-bold text-green-600 bg-white inline-block px-3 py-1 rounded border border-green-100 shadow-sm">
                          {formatCurrency(results.difference)} {results.difference > 0 ? 'Savings' : ''}
                        </p>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Work / Reference Box */}
                <div className="bg-slate-800 rounded-2xl shadow-sm overflow-hidden text-slate-300">
                  <div className="px-6 py-4 border-b border-slate-700 flex items-center space-x-2">
                    <TrendingUpIcon />
                    <h3 className="font-semibold text-white">Work & Reference (Show Your Work)</h3>
                  </div>
                  <div className="p-6 font-mono text-sm space-y-6">
                    
                    {/* Make Math */}
                    <div>
                      <h4 className="text-blue-400 font-bold mb-2">--- COST TO MAKE CALCULATIONS ---</h4>
                      <ul className="space-y-1">
                        <li>1. Variable Cost per Unit:</li>
                        <li className="pl-4">DM ({formatCurrency(data.dm)}) + DL ({formatCurrency(data.dl)}) + VMOH ({formatCurrency(data.vmoh)}) = {formatCurrency(results.totalVariableCostPerUnit)}/unit</li>
                        <li className="mt-2">2. Total Variable Costs:</li>
                        <li className="pl-4">{formatCurrency(results.totalVariableCostPerUnit)} × {data.volume.toLocaleString()} units = {formatCurrency(results.totalVariableCost)}</li>
                        <li className="mt-2">3. Add Avoidable Fixed Costs:</li>
                        <li className="pl-4">{formatCurrency(data.avoidableFC)}</li>
                        <li className="mt-3 text-white border-t border-slate-600 pt-2 font-bold">
                          TOTAL RELEVANT MAKE COST = {formatCurrency(results.totalVariableCost)} + {formatCurrency(data.avoidableFC)} = {formatCurrency(results.totalRelevantMakeCost)}
                        </li>
                      </ul>
                    </div>

                    {/* Buy Math */}
                    <div>
                      <h4 className="text-purple-400 font-bold mb-2">--- COST TO BUY CALCULATIONS ---</h4>
                      <ul className="space-y-1">
                        <li>1. Total Outsource Purchase Price:</li>
                        <li className="pl-4">{formatCurrency(data.purchasePrice)} × {data.volume.toLocaleString()} units = {formatCurrency(results.totalOutsourceCost)}</li>
                        <li className="mt-2">2. Less Opportunity Income (Freed Capacity):</li>
                        <li className="pl-4">- {formatCurrency(data.opportunityIncome)}</li>
                        <li className="mt-3 text-white border-t border-slate-600 pt-2 font-bold">
                          TOTAL RELEVANT BUY COST = {formatCurrency(results.totalOutsourceCost)} - {formatCurrency(data.opportunityIncome)} = {formatCurrency(results.totalRelevantBuyCost)}
                        </li>
                      </ul>
                    </div>

                    {/* Note */}
                    <div className="bg-slate-700/50 p-3 rounded-lg border border-slate-600 text-xs text-slate-400 mt-4 flex items-start">
                      <AlertCircleIcon />
                      <p>Note on Unavoidable Fixed Costs: The {formatCurrency(data.unavoidableFC)} in unavoidable fixed costs are correctly excluded from the calculations above. Because these costs will be incurred regardless of whether the company makes or buys the product, they are not relevant to differential analysis.</p>
                    </div>

                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    // Render the React application to the DOM
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
