<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep vs Replace Calculator</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel for standalone in-browser execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Inline SVG Icons (Replacing lucide-react for standalone usage) ---
        const Calculator = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                <line x1="8" y1="6" x2="16" y2="6"></line>
                <line x1="16" y1="14" x2="16" y2="18"></line>
                <path d="M16 10h.01"></path>
                <path d="M12 10h.01"></path>
                <path d="M8 10h.01"></path>
                <path d="M12 14h.01"></path>
                <path d="M8 14h.01"></path>
                <path d="M12 18h.01"></path>
                <path d="M8 18h.01"></path>
            </svg>
        );

        const Truck = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="1" y="3" width="15" height="13"></rect>
                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                <circle cx="5.5" cy="18.5" r="2.5"></circle>
                <circle cx="18.5" cy="18.5" r="2.5"></circle>
            </svg>
        );

        const Plus = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const Trash2 = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );

        const DollarSign = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="1" x2="12" y2="23"></line>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
        );

        const AlertCircle = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const Info = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        );
        // ------------------------------------------------------------------------

        const KeepReplaceCalculator = () => {
          // General setup for future problems
          const [horizon, setHorizon] = useState('');
          
          // One-time capital values
          const [oldEquip, setOldEquip] = useState({
            originalCost: '',
            currentValue: '',
            futureSalvage: '',
          });

          const [newEquip, setNewEquip] = useState({
            purchasePrice: '',
            futureSalvage: '',
          });

          // Operating costs over the horizon
          const [operatingCosts, setOperatingCosts] = useState([
            { id: 1, name: 'Operating Cost 1', oldAnnual: '', oldTotal: 0, newAnnual: '', newTotal: 0 },
            { id: 2, name: 'Operating Cost 2', oldAnnual: '', oldTotal: 0, newAnnual: '', newTotal: 0 },
            { id: 3, name: 'Operating Cost 3', oldAnnual: '', oldTotal: 0, newAnnual: '', newTotal: 0 }
          ]);

          // Output States
          const [results, setResults] = useState({
            keepCost: 0,
            buyCost: 0,
            difference: 0,
            decision: '',
            reason: ''
          });

          // Helper to format currency
          const formatCcy = (value) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(value || 0);
          };

          // Handlers for Operating Costs table
          const handleCostChange = (id, field, value) => {
            const numValue = parseFloat(value) || 0;
            
            setOperatingCosts(prevCosts => prevCosts.map(cost => {
              if (cost.id !== id) return cost;
              
              const updatedCost = { ...cost, [field]: numValue };
              
              // Auto-calculate Total if Annual is changed
              if (field === 'oldAnnual') updatedCost.oldTotal = numValue * (parseFloat(horizon) || 0);
              if (field === 'newAnnual') updatedCost.newTotal = numValue * (parseFloat(horizon) || 0);
              
              return updatedCost;
            }));
          };

          const handleNameChange = (id, value) => {
            setOperatingCosts(prevCosts => prevCosts.map(cost => 
              cost.id === id ? { ...cost, name: value } : cost
            ));
          };

          const addCostRow = () => {
            const newId = operatingCosts.length > 0 ? Math.max(...operatingCosts.map(c => c.id)) + 1 : 1;
            setOperatingCosts([...operatingCosts, { id: newId, name: 'New Cost', oldAnnual: 0, oldTotal: 0, newAnnual: 0, newTotal: 0 }]);
          };

          const removeCostRow = (id) => {
            setOperatingCosts(operatingCosts.filter(c => c.id !== id));
          };

          // Main Calculation Logic
          useEffect(() => {
            // 1. Calculate Total Operating Costs (Excluding Irrelevant Costs where old == new)
            const totalOldOperating = operatingCosts.reduce((sum, cost) => {
              const isIrrelevant = parseFloat(cost.oldTotal) === parseFloat(cost.newTotal);
              return isIrrelevant ? sum : sum + (parseFloat(cost.oldTotal) || 0);
            }, 0);
            
            const totalNewOperating = operatingCosts.reduce((sum, cost) => {
              const isIrrelevant = parseFloat(cost.oldTotal) === parseFloat(cost.newTotal);
              return isIrrelevant ? sum : sum + (parseFloat(cost.newTotal) || 0);
            }, 0);

            // 2. Compute Net Relevant Cost to Keep
            // Total Operating Costs - Future Salvage Value of Old
            const netKeepCost = totalOldOperating - (parseFloat(oldEquip.futureSalvage) || 0);

            // 3. Compute Net Relevant Cost to Buy
            // Purchase Price - Current Sale Value of Old (Cash Inflow) + Total Operating Costs - Future Salvage of New
            const netBuyCost = (parseFloat(newEquip.purchasePrice) || 0) 
                             - (parseFloat(oldEquip.currentValue) || 0) 
                             + totalNewOperating 
                             - (parseFloat(newEquip.futureSalvage) || 0);

            // 4. Determine Difference and Decision
            const diff = Math.abs(netKeepCost - netBuyCost);
            let decisionStr = '';
            let reasonStr = '';

            if (netKeepCost === 0 && netBuyCost === 0) {
              decisionStr = '-';
              reasonStr = `Awaiting input data...`;
            } else if (netBuyCost < netKeepCost) {
              decisionStr = 'Buy the New Equipment';
              reasonStr = `Buying new has a lower net relevant cost over the ${horizon || 0}-year period.`;
            } else if (netKeepCost < netBuyCost) {
              decisionStr = 'Keep the Old Equipment';
              reasonStr = `Keeping the old equipment has a lower net relevant cost over the ${horizon || 0}-year period.`;
            } else {
              decisionStr = 'Indifferent (Financial Tie)';
              reasonStr = `Both options have the exact same net relevant financial cost. Base decision on qualitative factors.`;
            }

            setResults({
              keepCost: netKeepCost,
              buyCost: netBuyCost,
              difference: diff,
              decision: decisionStr,
              reason: reasonStr
            });

          }, [horizon, oldEquip, newEquip, operatingCosts]);

          return (
            <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
              <div className="max-w-6xl mx-auto space-y-6">
                
                {/* Header */}
                <div className="bg-white rounded-xl shadow-sm p-6 border border-slate-200 flex items-center justify-between">
                  <div>
                    <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                      <Calculator className="text-blue-600" size={28} /> Keep vs. Replace Decision Calculator
                    </h1>
                    <p className="text-slate-500 mt-1">Input your case data below. Net relevant costs and final decisions update automatically.</p>
                  </div>
                  <div className="hidden md:flex flex-col text-right">
                    <span className="text-sm font-medium text-slate-500">Analysis Horizon</span>
                    <div className="flex items-center justify-end gap-2 mt-1">
                      <input 
                        type="number" 
                        value={horizon} 
                        onChange={(e) => setHorizon(e.target.value)}
                        className="w-20 p-2 border border-slate-300 rounded-md text-right focus:ring-2 focus:ring-blue-500 outline-none"
                      />
                      <span className="font-semibold">Years</span>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  
                  {/* LEFT COLUMN: Inputs */}
                  <div className="lg:col-span-2 space-y-6">
                    
                    {/* Capital Values Section */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-100 px-6 py-4 border-b border-slate-200 flex items-center gap-2">
                        <Truck className="text-slate-600" size={20} />
                        <h2 className="text-lg font-bold text-slate-800">Capital Values & Salvage</h2>
                      </div>
                      <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* Old Equip */}
                        <div className="space-y-4">
                          <h3 className="font-semibold text-blue-700 border-b pb-2">Old Equipment</h3>
                          
                          <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1 flex items-center justify-between">
                              Original Cost
                              <span className="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full flex items-center gap-1">
                                <Info size={12}/> Sunk Cost (Ignored)
                              </span>
                            </label>
                            <div className="relative">
                              <DollarSign className="absolute left-3 top-2.5 text-slate-400" size={18} />
                              <input type="number" value={oldEquip.originalCost} onChange={(e) => setOldEquip({...oldEquip, originalCost: e.target.value})} className="pl-9 w-full p-2 border border-slate-300 rounded-md bg-slate-50 text-slate-500" />
                            </div>
                          </div>

                          <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1">Current Sale Value (If sold today)</label>
                            <div className="relative">
                              <DollarSign className="absolute left-3 top-2.5 text-slate-400" size={18} />
                              <input type="number" value={oldEquip.currentValue} onChange={(e) => setOldEquip({...oldEquip, currentValue: e.target.value})} className="pl-9 w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                          </div>

                          <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1">Future Salvage Value (In {horizon} yrs)</label>
                            <div className="relative">
                              <DollarSign className="absolute left-3 top-2.5 text-slate-400" size={18} />
                              <input type="number" value={oldEquip.futureSalvage} onChange={(e) => setOldEquip({...oldEquip, futureSalvage: e.target.value})} className="pl-9 w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                          </div>
                        </div>

                        {/* New Equip */}
                        <div className="space-y-4">
                          <h3 className="font-semibold text-green-700 border-b pb-2">New Equipment</h3>
                          
                          <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1">Purchase Price</label>
                            <div className="relative">
                              <DollarSign className="absolute left-3 top-2.5 text-slate-400" size={18} />
                              <input type="number" value={newEquip.purchasePrice} onChange={(e) => setNewEquip({...newEquip, purchasePrice: e.target.value})} className="pl-9 w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                          </div>

                          <div className="opacity-50 pointer-events-none hidden md:block">
                             {/* Spacer to align inputs */}
                             <label className="block text-sm font-medium mb-1">&nbsp;</label>
                             <div className="p-2 border border-transparent">&nbsp;</div>
                          </div>

                          <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1">Future Salvage Value (In {horizon} yrs)</label>
                            <div className="relative">
                              <DollarSign className="absolute left-3 top-2.5 text-slate-400" size={18} />
                              <input type="number" value={newEquip.futureSalvage} onChange={(e) => setNewEquip({...newEquip, futureSalvage: e.target.value})} className="pl-9 w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" />
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Operating Costs Table */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-100 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                        <h2 className="text-lg font-bold text-slate-800">Operating Costs over {horizon} Years</h2>
                        <button onClick={addCostRow} className="flex items-center gap-1 text-sm bg-white border border-slate-300 hover:bg-slate-50 px-3 py-1.5 rounded-md font-medium text-slate-700 transition">
                          <Plus size={16} /> Add Row
                        </button>
                      </div>
                      
                      <div className="p-0 overflow-x-auto">
                        <table className="w-full text-left text-sm">
                          <thead className="bg-slate-50 border-b border-slate-200 text-slate-600">
                            <tr>
                              <th className="p-4 font-semibold w-1/4">Cost Category</th>
                              <th className="p-4 font-semibold bg-blue-50/30 text-blue-800 text-center" colSpan="2">Old Equipment</th>
                              <th className="p-4 font-semibold bg-green-50/30 text-green-800 text-center" colSpan="2">New Equipment</th>
                              <th className="p-4"></th>
                            </tr>
                            <tr className="text-xs text-slate-500 uppercase tracking-wider bg-slate-50/50 border-b border-slate-200">
                              <th className="px-4 py-2 font-medium">Name</th>
                              <th className="px-4 py-2 font-medium text-right bg-blue-50/30">Annual</th>
                              <th className="px-4 py-2 font-medium text-right bg-blue-50/30">Total Life</th>
                              <th className="px-4 py-2 font-medium text-right bg-green-50/30">Annual</th>
                              <th className="px-4 py-2 font-medium text-right bg-green-50/30">Total Life</th>
                              <th></th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {operatingCosts.map((cost) => {
                              const oldT = parseFloat(cost.oldTotal) || 0;
                              const newT = parseFloat(cost.newTotal) || 0;
                              const isIrrelevant = oldT === newT && oldT !== 0;
                              
                              return (
                              <tr key={cost.id} className={`hover:bg-slate-50/50 ${isIrrelevant ? 'bg-slate-50/80 opacity-75' : ''}`}>
                                <td className="p-2">
                                  <input type="text" value={cost.name} onChange={(e) => handleNameChange(cost.id, e.target.value)} className={`w-full p-1.5 border border-transparent hover:border-slate-300 focus:border-blue-500 rounded outline-none bg-transparent ${isIrrelevant ? 'line-through text-slate-500' : ''}`} />
                                  {isIrrelevant && <div className="text-[10px] text-yellow-600 font-bold px-1 uppercase">Irrelevant Cost</div>}
                                </td>
                                
                                {/* Old Costs */}
                                <td className="p-2 bg-blue-50/10">
                                  <input type="number" value={cost.oldAnnual || ''} placeholder="0" onChange={(e) => handleCostChange(cost.id, 'oldAnnual', e.target.value)} className={`w-full p-1.5 border border-slate-200 rounded text-right outline-none focus:ring-1 focus:ring-blue-500 ${isIrrelevant ? 'text-slate-400' : ''}`} />
                                </td>
                                <td className="p-2 bg-blue-50/10">
                                  <input type="number" value={cost.oldTotal} onChange={(e) => handleCostChange(cost.id, 'oldTotal', e.target.value)} className={`w-full p-1.5 border border-slate-300 font-medium rounded text-right outline-none focus:ring-1 focus:ring-blue-600 bg-white shadow-sm ${isIrrelevant ? 'text-slate-400' : ''}`} />
                                </td>
                                
                                {/* New Costs */}
                                <td className="p-2 bg-green-50/10">
                                  <input type="number" value={cost.newAnnual || ''} placeholder="0" onChange={(e) => handleCostChange(cost.id, 'newAnnual', e.target.value)} className={`w-full p-1.5 border border-slate-200 rounded text-right outline-none focus:ring-1 focus:ring-green-500 ${isIrrelevant ? 'text-slate-400' : ''}`} />
                                </td>
                                <td className="p-2 bg-green-50/10">
                                  <input type="number" value={cost.newTotal} onChange={(e) => handleCostChange(cost.id, 'newTotal', e.target.value)} className={`w-full p-1.5 border border-slate-300 font-medium rounded text-right outline-none focus:ring-1 focus:ring-green-600 bg-white shadow-sm ${isIrrelevant ? 'text-slate-400' : ''}`} />
                                </td>
                                
                                <td className="p-2 text-center">
                                  <button onClick={() => removeCostRow(cost.id)} className="text-slate-400 hover:text-red-500 p-1 rounded-md transition cursor-pointer">
                                    <Trash2 size={16} />
                                  </button>
                                </td>
                              </tr>
                            )})}
                          </tbody>
                        </table>
                        <div className="p-3 text-xs text-slate-500 bg-yellow-50 flex items-start gap-2 border-t border-slate-200">
                          <AlertCircle size={14} className="mt-0.5 text-yellow-600 flex-shrink-0" />
                          <p><strong>Note for irregular costs:</strong> If a cost varies over time (e.g., "Maintenance is 0 for 2 years, then 5,000 for 8 years"), ignore the "Annual" box and type the total directly into the <strong>"Total Life"</strong> box. (e.g., 0 + 8*5000 = 40,000).</p>
                        </div>
                      </div>
                    </div>
                    
                  </div>

                  {/* RIGHT COLUMN: Results & Homework Answers */}
                  <div className="space-y-6">
                    
                    {/* Answer Panel */}
                    <div className="bg-slate-900 rounded-xl shadow-lg border border-slate-800 text-white overflow-hidden relative">
                      <div className="absolute top-0 right-0 p-4 opacity-10">
                        <Calculator size={100} />
                      </div>
                      <div className="p-6 relative z-10">
                        <h2 className="text-lg font-bold text-slate-300 mb-6 uppercase tracking-wider text-sm">Analysis Results</h2>
                        
                        <div className="space-y-5">
                          <div>
                            <div className="text-sm text-slate-400 mb-1">Total NET Relevant Cost to Keep:</div>
                            <div className="text-2xl font-bold text-blue-400">{formatCcy(results.keepCost)}</div>
                          </div>

                          <div>
                            <div className="text-sm text-slate-400 mb-1">Total NET Relevant Cost to Buy:</div>
                            <div className="text-2xl font-bold text-green-400">{formatCcy(results.buyCost)}</div>
                          </div>

                          <div className="h-px bg-slate-700 w-full my-4"></div>

                          <div>
                            <div className="text-sm text-slate-400 mb-1">Decision: Keep or Buy? Why?</div>
                            <div className="font-bold text-lg mb-1">{results.decision || 'Awaiting Inputs...'}</div>
                            <div className="text-sm text-slate-300">{results.reason}</div>
                          </div>

                          <div className="bg-slate-800 p-3 rounded-lg border border-slate-700 mt-2">
                            <div className="text-sm text-slate-400 mb-1">Dollar Benefit to Decision:</div>
                            <div className="text-xl font-bold text-yellow-400">{formatCcy(results.difference)} Savings</div>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Qualitative Answers Panel */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-5">
                      <h3 className="font-bold text-slate-800 border-b border-slate-100 pb-2">Qualitative Factors (Brainstorming)</h3>
                      
                      <div>
                        <h4 className="text-sm font-bold text-green-700 mb-2">Qualitative Benefits of Buying New:</h4>
                        <textarea 
                          className="w-full p-3 border border-slate-200 rounded-md text-sm text-slate-600 focus:ring-2 focus:ring-green-500 outline-none min-h-[80px]" 
                          placeholder="e.g., Better safety features, improved reputation, higher morale..."
                        ></textarea>
                      </div>

                      <div>
                        <h4 className="text-sm font-bold text-red-700 mb-2">Qualitative "Costs" of Buying New:</h4>
                        <textarea 
                          className="w-full p-3 border border-slate-200 rounded-md text-sm text-slate-600 focus:ring-2 focus:ring-red-500 outline-none min-h-[80px]" 
                          placeholder="e.g., Learning curve for new equipment, temporary disruption..."
                        ></textarea>
                      </div>
                    </div>

                    {/* Detail Breakdown Accordion / View */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                      <h3 className="text-sm font-bold text-slate-800 mb-3 text-center uppercase tracking-wider">How the Math Works</h3>
                      <div className="p-3 text-xs text-slate-600 bg-blue-50/50 mb-3 border border-blue-100 rounded leading-relaxed">
                        <strong>Accounting Rule Applied:</strong> The calculator automatically ignores <em>Irrelevant Costs</em>. If an operating cost (like Insurance) is exactly the same for both keeping and buying, it cancels itself out and is excluded from the Net Relevant Cost.
                      </div>
                      <div className="text-xs text-slate-600 space-y-3 font-mono bg-slate-50 p-3 rounded">
                        <div className="border-b border-slate-200 pb-2">
                          <div className="font-bold text-blue-700 mb-1">KEEP OLD CALC:</div>
                          <div>+ Relevant Operating Costs: {formatCcy(operatingCosts.reduce((s,c)=>parseFloat(c.oldTotal) !== parseFloat(c.newTotal) ? s+parseFloat(c.oldTotal||0) : s, 0))}</div>
                          <div>- Future Salvage Value: {formatCcy(oldEquip.futureSalvage)}</div>
                          <div className="font-bold border-t border-slate-200 mt-1 pt-1">= Net Cost: {formatCcy(results.keepCost)}</div>
                        </div>
                        <div>
                          <div className="font-bold text-green-700 mb-1">BUY NEW CALC:</div>
                          <div>+ Purchase Price: {formatCcy(newEquip.purchasePrice)}</div>
                          <div>- Sale of Old Equip: {formatCcy(oldEquip.currentValue)}</div>
                          <div>+ Relevant Operating Costs: {formatCcy(operatingCosts.reduce((s,c)=>parseFloat(c.oldTotal) !== parseFloat(c.newTotal) ? s+parseFloat(c.newTotal||0) : s, 0))}</div>
                          <div>- Future Salvage Value: {formatCcy(newEquip.futureSalvage)}</div>
                          <div className="font-bold border-t border-slate-200 mt-1 pt-1">= Net Cost: {formatCcy(results.buyCost)}</div>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            </div>
          );
        };

        // Render the app to the root div
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KeepReplaceCalculator />);
    </script>
</body>
</html>
