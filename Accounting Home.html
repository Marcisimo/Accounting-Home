<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Calculators Hub</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Inline SVG Icons ---
        const BookOpen = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
        );

        const ArrowRight = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        );

        const RefreshCw = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        );

        const Factory = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path>
                <path d="M17 18h1"></path>
                <path d="M12 18h1"></path>
                <path d="M7 18h1"></path>
            </svg>
        );

        const Building = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                <path d="M9 22v-4h6v4"></path>
                <path d="M8 6h.01"></path>
                <path d="M16 6h.01"></path>
                <path d="M12 6h.01"></path>
                <path d="M12 10h.01"></path>
                <path d="M12 14h.01"></path>
                <path d="M16 10h.01"></path>
                <path d="M16 14h.01"></path>
                <path d="M8 10h.01"></path>
                <path d="M8 14h.01"></path>
            </svg>
        );

        const CalculatorIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                <line x1="8" y1="6" x2="16" y2="6"></line>
                <line x1="16" y1="14" x2="16" y2="18"></line>
                <path d="M16 10h.01"></path>
                <path d="M12 10h.01"></path>
                <path d="M8 10h.01"></path>
                <path d="M12 14h.01"></path>
                <path d="M8 14h.01"></path>
                <path d="M12 18h.01"></path>
                <path d="M8 18h.01"></path>
            </svg>
        );

        // --- Data Structure for the Chapters and Calculators ---
        const curriculum = [
            {
                chapterNumber: 7,
                title: "Differential Analysis",
                description: "Short-term decision making using relevant costs, revenues, and opportunity costs.",
                color: "blue",
                calculators: [
                    {
                        name: "Keep vs. Replace Calculator",
                        filename: "Keep or Replace.html",
                        description: "Determine whether to keep an old asset or replace it with a new one by comparing net relevant costs over a specific horizon.",
                        icon: RefreshCw
                    },
                    {
                        name: "Make vs. Buy Calculator",
                        filename: "Make or Buy.html",
                        description: "Decide whether to manufacture a part internally or buy it from an external supplier based on avoidable fixed costs and opportunity income.",
                        icon: Factory
                    }
                ]
            },
            {
                chapterNumber: 8,
                title: "Capital Budgeting",
                description: "Long-term investment decisions, present value analysis, and time value of money.",
                color: "emerald",
                calculators: [
                    {
                        name: "Capital Budgeting Calculator",
                        filename: "Chapter 8 Capital Budgeting.html",
                        description: "Calculate Net Present Value (NPV), Profitability Index, Internal Rate of Return (IRR), and simple net cash flows for equipment purchases.",
                        icon: CalculatorIcon
                    },
                    {
                        name: "Real Estate NPV Calculator",
                        filename: "Present Value Real Estate.html",
                        description: "Detailed present value analysis for real estate investments including down payments, taxes, depreciation, and mortgages.",
                        icon: Building
                    }
                ]
            }
        ];

        // --- Main App Component ---
        const App = () => {
            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-4xl mx-auto space-y-8">
                        
                        {/* Header Section */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 to-emerald-500"></div>
                            <div className="mx-auto bg-slate-100 w-16 h-16 rounded-2xl flex items-center justify-center mb-4">
                                <BookOpen size={32} className="text-slate-700" />
                            </div>
                            <h1 className="text-3xl font-bold text-slate-900 tracking-tight mb-2">Managerial Accounting Tools</h1>
                            <p className="text-slate-500 max-w-xl mx-auto text-lg">
                                Select a calculator below to quickly solve assignment problems. All tools automatically calculate results and show the math based on standard accounting rules.
                            </p>
                        </div>

                        {/* Chapters Loop */}
                        <div className="space-y-8">
                            {curriculum.map((chapter) => {
                                // Dynamic color classes
                                const badgeColor = chapter.color === 'blue' ? 'bg-blue-100 text-blue-800' : 'bg-emerald-100 text-emerald-800';
                                const iconColor = chapter.color === 'blue' ? 'text-blue-600' : 'text-emerald-600';
                                const hoverBorder = chapter.color === 'blue' ? 'hover:border-blue-400' : 'hover:border-emerald-400';
                                const hoverShadow = chapter.color === 'blue' ? 'hover:shadow-blue-100' : 'hover:shadow-emerald-100';

                                return (
                                    <div key={chapter.chapterNumber} className="space-y-4">
                                        <div className="flex items-center gap-3 px-2">
                                            <span className={`text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider ${badgeColor}`}>
                                                Chapter {chapter.chapterNumber}
                                            </span>
                                            <h2 className="text-xl font-bold text-slate-800">{chapter.title}</h2>
                                        </div>
                                        <p className="text-slate-500 px-2 text-sm">{chapter.description}</p>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {chapter.calculators.map((calc, idx) => {
                                                const IconComponent = calc.icon;
                                                return (
                                                    <a 
                                                        key={idx} 
                                                        href={calc.filename} 
                                                        className={`group bg-white rounded-xl p-6 border border-slate-200 shadow-sm transition-all duration-200 block cursor-pointer flex flex-col justify-between h-full ${hoverBorder} hover:shadow-lg ${hoverShadow} hover:-translate-y-1`}
                                                    >
                                                        <div>
                                                            <div className="flex items-start justify-between mb-4">
                                                                <div className={`p-3 rounded-lg bg-slate-50 group-hover:bg-white transition-colors ${iconColor}`}>
                                                                    <IconComponent size={24} />
                                                                </div>
                                                                <ArrowRight size={20} className="text-slate-300 group-hover:text-slate-800 transition-colors" />
                                                            </div>
                                                            <h3 className="text-lg font-bold text-slate-900 mb-2">{calc.name}</h3>
                                                            <p className="text-sm text-slate-500 leading-relaxed">
                                                                {calc.description}
                                                            </p>
                                                        </div>
                                                    </a>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* Footer */}
                        <div className="text-center pt-8 text-sm text-slate-400">
                            <p>Ensure all calculator HTML files are saved in the same folder as this index page.</p>
                        </div>
                    </div>
                </div>
            );
        };

        // Render the application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
